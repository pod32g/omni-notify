services:
  omni-notify:
    build:
      context: .
      args:
        VERSION: ${VERSION:-0.1.0}
    image: omni-notify:local
    container_name: omni-notify
    restart: unless-stopped
    # The config file sets the listen address (:8080) and SQLite path (/data).
    command: ["-config", "/etc/omni-notify/config.yml"]
    environment:
      # Bearer token(s) accepted by the API. Secret → host .env / CI secret,
      # referenced as ${OMNI_NOTIFY_API_TOKEN} by config.docker.yml.
      OMNI_NOTIFY_API_TOKEN: ${OMNI_NOTIFY_API_TOKEN:-}
      # Base64 32-byte key used to encrypt provider secrets at rest. Required
      # whenever any provider has a secret. Secret → host env / CI secret.
      OMNI_NOTIFY_ENCRYPTION_KEY: ${OMNI_NOTIFY_ENCRYPTION_KEY:-}
      # Ingest key for forwarding logs to omni-logging (config.docker.yml's
      # log.forward.api_key). Must match an OMNILOG_INGEST_KEYS value on the
      # omni-logging side. Secret → host .env / CI secret.
      OMNI_LOGGING_API_KEY: ${OMNI_LOGGING_API_KEY:-}
    ports:
      # host 8088 -> container 8080 (host 8080 is taken by omnilog on the box).
      - "8088:8080"
    volumes:
      - omni-notify-data:/data
      - ./config.docker.yml:/etc/omni-notify/config.yml:ro
    healthcheck:
      # Distroless has no shell/curl, so the binary self-probes.
      test: ["CMD", "/omni-notify", "healthcheck", "-url", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

volumes:
  omni-notify-data:
    name: omni-notify-data
